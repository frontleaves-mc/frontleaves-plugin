syntax = "proto3";

package frontleaves.essentials.v1;

option go_package = "github.com/frontleaves-mc/frontleaves-plugin/internal/grpc/gen/essentials/v1;essentialspb";

import "link/base.proto";
import "google/protobuf/empty.proto";

// PlayerMessageService 玩家消息推送服务
//
// Go 服务端主动向 Minecraft Essentials 插件推送消息，
// 使用 Server-Streaming 模式，MC 插件连接后持续接收推送。
service PlayerMessageService {
  // PlayerMessageStream 消息推送服务端流
  rpc PlayerMessageStream(google.protobuf.Empty) returns (stream PlayerMessagePushResponse);
}

// PlayerMessagePushType 消息推送类型
enum PlayerMessagePushType {
  PLAYER_MESSAGE_PUSH_TYPE_UNSPECIFIED = 0;
  PLAYER_MESSAGE_PUSH_TYPE_CHAT = 1;
  PLAYER_MESSAGE_PUSH_TYPE_SYSTEM = 2;
  PLAYER_MESSAGE_PUSH_TYPE_PRIVATE = 3;
}

// PlayerMessagePushResponse 消息推送响应
message PlayerMessagePushResponse {
  // 基础响应
  xBase.BaseResponse base_response = 1;
  // 推送类型
  PlayerMessagePushType push_type = 2;
  // 推送内容
  oneof payload {
    // 聊天消息推送
    PlayerChatPush chat_push = 11;
    // 系统消息推送
    SystemMessagePush system_push = 12;
    // 私聊消息推送
    PrivateMessagePush private_push = 13;
  }
}

// PlayerChatPush 聊天消息推送
message PlayerChatPush {
  // 发送者名称
  string sender_name = 1;
  // 消息内容
  string message = 2;
  // 消息来源
  string source = 3;
}

// SystemMessagePush 系统消息推送
message SystemMessagePush {
  // 消息标题
  string title = 1;
  // 消息内容
  string content = 2;
}

// PrivateMessagePush 私聊消息推送
message PrivateMessagePush {
  string sender_name = 1;
  string message = 2;
  string sender_uuid = 3;
}
