syntax = "proto3";

package frontleaves.status.v1;

option go_package = "github.com/frontleaves-mc/frontleaves-plugin/internal/grpc/gen/status/v1;statuspb";

import "link/base.proto";

// ServerStatusService 服务器状态服务
//
// 处理 Minecraft 服务器上报的实时玩家状态和服务器心跳，
// 同时提供按服务器/玩家维度的状态查询能力。
service ServerStatusService {
  // PlayerJoin 玩家加入服务器
  rpc PlayerJoin(PlayerEventRequest) returns (PlayerEventResponse);
  // PlayerQuit 玩家离开服务器
  rpc PlayerQuit(PlayerEventRequest) returns (PlayerEventResponse);
  // PlayerSwitchWorld 玩家切换世界
  rpc PlayerSwitchWorld(PlayerSwitchWorldRequest) returns (PlayerEventResponse);
  // ServerHeartbeat 服务器心跳上报
  rpc ServerHeartbeat(ServerHeartbeatRequest) returns (ServerHeartbeatResponse);
  // PlayerChat 玩家聊天
  rpc PlayerChat(PlayerChatRequest) returns (PlayerEventResponse);
  // PlayerKick 玩家被踢出
  rpc PlayerKick(PlayerKickRequest) returns (PlayerEventResponse);
  // PlayerDeath 玩家死亡
  rpc PlayerDeath(PlayerDeathRequest) returns (PlayerEventResponse);
  // PlayerGroupChange 玩家权限组变更
  rpc PlayerGroupChange(PlayerGroupChangeRequest) returns (PlayerGroupChangeResponse);
  // ServerQuery 服务器查询双向流
  rpc ServerQuery(stream ServerQueryRequest) returns (stream ServerQueryResponse);
}

// PlayerEventRequest 玩家事件请求
message PlayerEventRequest {
  // 玩家 UUID
  string player_uuid = 11;
  // 玩家用户名
  string player_name = 12;
  // 服务器名称
  string server_name = 13;
  // 世界名称
  string world_name = 14;
  // 权限组名称
  string group_name = 15;
}

// PlayerSwitchWorldRequest 玩家切换世界请求
message PlayerSwitchWorldRequest {
  // 玩家 UUID
  string player_uuid = 11;
  // 新世界名称
  string new_world_name = 12;
  // 服务器名称
  string server_name = 13;
}

// PlayerEventResponse 玩家事件响应
message PlayerEventResponse {
  xBase.BaseResponse base_response = 1;
}

// ServerHeartbeatRequest 服务器心跳请求
message ServerHeartbeatRequest {
  // 服务器名称
  string server_name = 11;
  // 当前在线玩家数
  int32 online_players = 12;
  // 服务器 TPS
  double tps = 13;
}

// ServerHeartbeatResponse 服务器心跳响应
message ServerHeartbeatResponse {
  xBase.BaseResponse base_response = 1;
}

// QueryEvent 查询事件类型
enum QueryEvent {
  QUERY_EVENT_UNSPECIFIED = 0;
  QUERY_EVENT_GET_PLAYER_STATUS = 1;
  QUERY_EVENT_GET_SERVER_STATUS = 2;
  QUERY_EVENT_CHECK_PERMISSION = 3;
  QUERY_EVENT_GET_PLAYER_GROUPS = 4;
}

// ServerQueryRequest 服务器查询请求
message ServerQueryRequest {
  QueryEvent event = 1;
  string request_id = 2;
  string player_uuid = 3;
  string server_name = 4;
  string permission_node = 5;
}

// ServerQueryResponse 服务器查询响应
message ServerQueryResponse {
  xBase.BaseResponse base_response = 1;
  string request_id = 2;
  QueryEvent event = 3;
  // GET_PLAYER_STATUS
  bool online = 11;
  string player_status_server_name = 12;
  string world_name = 13;
  string player_name = 14;
  int64 last_seen = 15;
  // GET_SERVER_STATUS
  repeated PlayerStatus players = 21;
  int32 online_players = 22;
  double tps = 23;
  int64 last_heartbeat = 24;
  // CHECK_PERMISSION
  bool has_permission = 31;
  // GET_PLAYER_GROUPS
  string primary_group = 41;
  repeated string groups = 42;
}

// PlayerGroupChangeRequest 玩家权限组变更请求
message PlayerGroupChangeRequest {
  string player_uuid = 11;
  string player_name = 12;
  string group_name = 13;
  string old_group_name = 14;
}

// PlayerGroupChangeResponse 玩家权限组变更响应
message PlayerGroupChangeResponse {
  xBase.BaseResponse base_response = 1;
}

// PlayerStatus 玩家状态信息
message PlayerStatus {
  // 玩家 UUID
  string player_uuid = 1;
  // 玩家用户名
  string player_name = 2;
  // 所在世界名称
  string world_name = 3;
}

// PlayerChatRequest 玩家聊天请求
message PlayerChatRequest {
  // 玩家 UUID
  string player_uuid = 11;
  // 玩家用户名
  string player_name = 12;
  // 服务器名称
  string server_name = 13;
  // 世界名称
  string world_name = 14;
  // 聊天消息内容
  string message = 15;
}

// PlayerKickRequest 玩家被踢出请求
message PlayerKickRequest {
  // 玩家 UUID
  string player_uuid = 11;
  // 玩家用户名
  string player_name = 12;
  // 服务器名称
  string server_name = 13;
  // 世界名称
  string world_name = 14;
  // 踢出原因
  string reason = 15;
}

// PlayerDeathRequest 玩家死亡请求
message PlayerDeathRequest {
  // 玩家 UUID
  string player_uuid = 11;
  // 玩家用户名
  string player_name = 12;
  // 服务器名称
  string server_name = 13;
  // 世界名称
  string world_name = 14;
  // 死亡消息
  string death_message = 15;
}
