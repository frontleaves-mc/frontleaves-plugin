info:
  contact: {}
paths:
  /achievements:
    get:
      consumes:
      - application/json
      description: 查询所有公开可查看的成就列表
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            allOf:
            - $ref: '#/definitions/xBase.BaseResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/apiAchievement.AchievementResponse'
                  type: array
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
      summary: '[公共] 查询公开成就列表'
      tags:
      - 成就接口
  /admin/achievements:
    get:
      consumes:
      - application/json
      description: 分页查询成就列表，可按类型筛选
      parameters:
