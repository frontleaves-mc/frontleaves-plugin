info:
  contact: {}
paths:
  /achievements:
    get:
      consumes:
      - application/json
      description: 查询所有公开可查看的成就列表
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            allOf:
            - $ref: '#/definitions/xBase.BaseResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/apiAchievement.AchievementResponse'
                  type: array
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
      summary: '[公共] 查询公开成就列表'
      tags:
      - 成就接口
  /admin/achievements:
    get:
      consumes:
      - application/json
      description: 分页查询成就列表，可按类型筛选
      parameters:
      - description: 页码
        in: query
        name: page
        type: integer
      - description: 每页数量
        in: query
        name: page_size
        type: integer
      - description: 成就类型筛选
        in: query
        name: type
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            allOf:
            - $ref: '#/definitions/xBase.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/apiAchievement.AchievementListResponse'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
      summary: '[管理] 查询成就列表'
      tags:
      - 管理-成就接口
    post:
      consumes:
      - application/json
      description: 创建新的成就定义
      parameters:
      - description: 创建成就请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/apiAchievement.CreateAchievementRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            allOf:
            - $ref: '#/definitions/xBase.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/apiAchievement.AchievementResponse'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
      summary: '[管理] 创建成就'
      tags:
      - 管理-成就接口
  /admin/achievements/:id:
    delete:
      consumes:
      - application/json
      description: 删除指定成就
      parameters:
      - description: 成就ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
        "404":
          description: 成就不存在
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
      summary: '[管理] 删除成就'
      tags:
      - 管理-成就接口
    get:
      consumes:
      - application/json
      description: 根据成就 ID 查询成就详情
      parameters:
      - description: 成就ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 成功
          schema:
            allOf:
            - $ref: '#/definitions/xBase.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/apiAchievement.AchievementResponse'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
        "404":
          description: 成就不存在
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
      summary: '[管理] 查询成就详情'
      tags:
      - 管理-成就接口
    put:
      consumes:
      - application/json
      description: 更新指定成就的信息
      parameters:
      - description: 成就ID
        in: path
        name: id
        required: true
        type: string
      - description: 更新成就请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/apiAchievement.UpdateAchievementRequest'
      produces:
      - application/json
      responses:
        "200":
