name: frontleaves-plugin
services:
  frontleaves-plugin:
    image: ccr.ccs.tencentyun.com/frontleaves/frontleaves-plugin:latest
    container_name: frontleaves-plugin-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: Asia/Shanghai
    ports:
      - "5599:5599"
      - "5600:5600"
    volumes:
      - .logs:/app/.logs
    networks:
      - 1panel-network
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5599/api/v1/health/ping" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
networks:
  1panel-network:
    external: true
